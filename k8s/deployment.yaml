apiVersion: apps/v1
kind: Deployment
metadata:
  name: sber-monitoring
  labels:
    app: sber-monitoring
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sber-monitoring
  template:
    metadata:
      labels:
        app: sber-monitoring
    spec:
      containers:
      - name: app
        image: k3d-sber-registry:5000/sber-monitoring:latest
        ports:
        - containerPort: 3000
