apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-all-in-one
  namespace: art2010901-dev
data:
  grafana.ini: |
    [server]
    root_url = https://grafana-route-art2010901-dev.apps.rm3.7wse.p1.openshiftapps.com
    [auth]
    disable_login_form = false
    [auth.anonymous]
    enabled = true
    org_role = Viewer

  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus:9090
      access: proxy
      isDefault: true

  dashboards.yaml: |
    apiVersion: 1
    providers:
    - name: SberMonitoring
      orgId: 1
      folder: ""
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /etc/grafana/provisioning/dashboards

  sber-monitoring-dashboard.json: |
    {
      "title": "Sber Monitoring",
      "tags": ["sber-monitoring"],
      "panels": [
        {
          "title": "Request Rate",
          "type": "graph",
          "targets": [{"expr": "rate(app_requests_total[1m])", "legendFormat": "{{method}} {{path}}"}],
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
        },
        {
          "title": "Active Requests",
          "type": "graph",
          "targets": [{"expr": "app_active_requests", "legendFormat": "active requests"}],
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
        },
        {
          "title": "App Info",
          "type": "stat",
          "targets": [{"expr": "app_info", "legendFormat": "version {{version}}"}],
          "gridPos": {"h": 4, "w": 12, "x": 0, "y": 8}
        },
        {
          "title": "Pod Status",
          "type": "table",
          "targets": [{"expr": "up", "legendFormat": "{{app}} {{instance}}"}],
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8}
        },
        {
          "title": "Disk Usage",
          "type": "gauge",
          "targets": [{"expr": "disk_usage_percent", "legendFormat": "disk %"}],
          "gridPos": {"h": 6, "w": 6, "x": 0, "y": 16},
          "options": {"min": 0, "max": 100, "thresholds": [
            {"color": "green", "value": null},
            {"color": "orange", "value": 80},
            {"color": "red", "value": 90}
          ]}
        },
        {
          "title": "CPU Usage",
          "type": "gauge",
          "targets": [{"expr": "cpu_usage_percent", "legendFormat": "CPU %"}],
          "gridPos": {"h": 6, "w": 6, "x": 6, "y": 16},
          "options": {"min": 0, "max": 100, "thresholds": [
            {"color": "green", "value": null},
            {"color": "orange", "value": 80},
            {"color": "red", "value": 90}
          ]}
        },
        {
          "title": "RAM Usage",
          "type": "gauge",
          "targets": [{"expr": "ram_usage_percent", "legendFormat": "RAM %"}],
          "gridPos": {"h": 6, "w": 6, "x": 12, "y": 16},
          "options": {"min": 0, "max": 100, "thresholds": [
            {"color": "green", "value": null},
            {"color": "orange", "value": 80},
            {"color": "red", "value": 90}
          ]}
        },
        {
          "title": "Service Health",
          "type": "stat",
          "targets": [{"expr": "up{job=\"sber-monitoring\"}", "legendFormat": "up"}],
          "gridPos": {"h": 6, "w": 6, "x": 18, "y": 16},
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          }
        }
      ],
      "schemaVersion": 22,
      "version": 1
    }
