apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: art2010901-dev
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
    - job_name: sber-monitoring
      static_configs:
      - targets:
        - sber-monitoring:8000
        labels:
          app: sber-monitoring-prod
    - job_name: prometheus
      static_configs:
      - targets:
        - localhost:9090
    rule_files:
    - /etc/prometheus/alerts.yml
  alerts.yml: |
    groups:
    - name: sber-monitoring
      rules:
      - alert: AppDown
        expr: up{job="sber-monitoring"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Sber-Monitoring PROD is down"
          description: "Job sber-monitoring has been down for more than 1 minute."
      - alert: HighErrorRate
        expr: rate(app_requests_total{job="sber-monitoring"}[5m]) > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High request rate on Sber-Monitoring"
          description: "Request rate is {{ $value }} req/s"
      - alert: DiskUsageHigh           # ← новый
        expr: disk_usage_percent > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage > 80%"
          description: "Root FS is {{ $value }}% full on pod {{ $labels.instance }}"
      - alert: DiskUsageCritical       # ← новый
        expr: disk_usage_percent > 90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Disk usage > 90%"
          description: "Root FS is {{ $value }}% full on pod {{ $labels.instance }}"
      - alert: CPUHigh
        expr: cpu_usage_percent > 80
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "CPU > 80%"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}"
      - alert: RAMHigh
        expr: ram_usage_percent > 80
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "RAM > 80%"
          description: "RAM usage is {{ $value }}% on {{ $labels.instance }}"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: art2010901-dev

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: art2010901-dev
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus
        - --web.console.libraries=/usr/share/prometheus/console_libraries
        - --web.console.templates=/usr/share/prometheus/consoles
        - --web.enable-lifecycle
        ports:
        - containerPort: 9090
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: data
          mountPath: /prometheus
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: data
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: art2010901-dev
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
  - name: http
    port: 9090
    targetPort: 9090
  type: ClusterIP

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: prometheus-route
  namespace: art2010901-dev
spec:
  to:
    kind: Service
    name: prometheus
  port:
    targetPort: http
  tls:
    termination: edge
  wildcardPolicy: None
